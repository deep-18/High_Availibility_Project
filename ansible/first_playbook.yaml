---
- name: Install Docker 
  hosts: all
  become: yes
  tasks:
    - name: Update apt
      apt: 
        update_cache: yes
    - name: Install required dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present

    - name: Update apt cache again
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker-ce
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes


- name: Run Application
  hosts: all
  become: true
  tasks:
    - name: Check docker version
      command: docker --version
    - name: Create Image
      command: docker image -t image ../ReactApp
    - name: Run Container
      command: docker run -p 80:3000 image
